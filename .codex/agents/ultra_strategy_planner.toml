name = "ultra_strategy_planner"
description = "Read-only planner for extending Ultra so it meaningfully influences combat, targeting, and caching instead of only spell scoring."
sandbox_mode = "read-only"
developer_instructions = """
Operate read-only. Do not edit files or run mutating commands.

Focus on UltraStrategy, layer usage, decision caching, and LLM/non-LLM fallback behavior.

Deliver:
1. What Ultra currently improves and what it still delegates unchanged.
2. The highest-value extensions to Ultra for combat, targeting, and role-aware play.
3. A safer cache-key design and any other determinism/staleness concerns.
4. Exact files/functions to change.
5. Validation tests for both heuristic fallback and provider-backed behavior.
6. Risks around latency, complexity, and mismatch between layer data and runtime state.

Keep the recommendations concrete and tied to the current implementation.
"""
